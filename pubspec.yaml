name: loci
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # UI & Styling
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.0.1
  flutter_svg: ^2.2.3

  # State Management & Logic
  get: ^4.6.5

  # Form & Input Components
  pinput: ^6.0.1
  intl_phone_field: ^3.2.0
  image_picker: ^1.2.1

  # Generators
  flutter_gen: ^5.12.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  sliding_up_panel: ^2.0.0+1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.0
  flutter_gen_runner: ^5.12.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

